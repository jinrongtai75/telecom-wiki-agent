repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=102400']  # 100MB
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: local
    hooks:
      - id: no-direct-llm-import
        name: No direct LLM imports
        language: pygrep
        entry: "^(import anthropic|import openai|import google\\.generativeai)"
        files: ^backend/app/(?!modules/llm_client).*\.py$
        types: [python]
