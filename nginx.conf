events {
    worker_connections 1024;
}

http {
    # 업로드 파일 크기 제한 (100MB PDF)
    client_max_body_size 110M;

    # 타임아웃 (LLM 응답 대기)
    proxy_read_timeout 180s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;

    # ── Wiki Agent 백엔드 (포트 8001) ──────────────────────────────────────
    server {
        listen 80;
        server_name _;  # VM IP로 접근 시 처리

        # Wiki 백엔드 API
        location /wiki/ {
            proxy_pass http://wiki-backend:8001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE 스트리밍 지원
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
        }

        # 전처리 백엔드 API
        location /prep/ {
            proxy_pass http://prep-backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE 스트리밍 지원
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            chunked_transfer_encoding on;
        }

        # 헬스체크
        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
